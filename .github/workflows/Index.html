<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HPOK Casino</title>

<link rel="manifest" href="manifest.json">

<style>
body{margin:0;font-family:Arial;background:#1e1e1e;color:white}
header{
background:#2a2a2a;
padding:10px 15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 0 10px #ff3ea5;
}
.logo{color:#ff3ea5;font-weight:bold;font-size:20px}
.balance{font-weight:bold}

.game-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(100px,1fr));
gap:10px;
padding:10px;
}

.game-item{
background:#2a2a2a;
border-radius:8px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.game-item:hover{
transform:scale(1.05);
box-shadow:0 0 10px #ff3ea5;
}

.game-item img{width:100%}
.game-item p{text-align:center;font-size:11px;padding:5px}

iframe{
width:100%;
height:85vh;
border:none;
}

#gameContainer{
display:none;
padding:10px;
}

.money-effect{
position:fixed;
top:20px;
right:20px;
color:red;
font-weight:bold;
font-size:18px;
animation:fadeUp 1s ease forwards;
}

@keyframes fadeUp{
0%{opacity:1;transform:translateY(0)}
100%{opacity:0;transform:translateY(-30px)}
}
</style>
</head>
<body>

<header>
<div class="logo">HPOK</div>
<div class="balance" id="balance"></div>
</header>

<div id="gameGrid" class="game-grid"></div>

<div id="gameContainer">
<button onclick="closeGame()">← Quay lại</button>
<iframe id="gameFrame"></iframe>
</div>

<script>

let balance = localStorage.getItem("balance")
? parseInt(localStorage.getItem("balance"))
: 1000000;

updateBalance();

function updateBalance(){
document.getElementById("balance").innerText =
"Số dư: " + balance.toLocaleString() + " đ";
localStorage.setItem("balance", balance);
}

function moneyEffect(amount){
const div=document.createElement("div");
div.className="money-effect";
div.innerText="-"+amount.toLocaleString()+" đ";
document.body.appendChild(div);
setTimeout(()=>div.remove(),1000);
}

const baseUrl="https://demogamesfree.pragmaticplay.net/gs2c/openGame.do?gameSymbol=";

const baseSymbols=[
"vs20starlight","vs20sweetbonanza","vs20wolfgold",
"vs20bigbass","vs20olympgate","vs20thedoghouse",
"vs20fruitparty","vs20aztecgems","vs20joker",
"vs20leprechaun"
];

// nhân thành ~200 game
let games=[];
for(let i=0;i<20;i++){
games=games.concat(baseSymbols);
}

const grid=document.getElementById("gameGrid");

games.forEach(symbol=>{
const div=document.createElement("div");
div.className="game-item";
div.innerHTML=`
<img loading="lazy"
src="https://demogamesfree.pragmaticplay.net/game_pic/square/200/${symbol}.png"
onerror="this.src='https://via.placeholder.com/150'">
<p>${symbol.replace('vs20','')}</p>
`;
div.onclick=()=>openGame(symbol);
grid.appendChild(div);
});

function openGame(symbol){

const betCost=10000;

if(balance<betCost){
alert("Không đủ tiền!");
return;
}

balance-=betCost;
updateBalance();
moneyEffect(betCost);

// lưu lịch sử
let history = JSON.parse(localStorage.getItem("history")) || [];
history.unshift(symbol);
localStorage.setItem("history", JSON.stringify(history));

const url=baseUrl+symbol+
"&websiteUrl=https%3A%2F%2Fdemogamesfree.pragmaticplay.net&jurisdiction=99&lang=ID&cur=IDR";

document.getElementById("gameFrame").src=url;
document.getElementById("gameContainer").style.display="block";
grid.style.display="none";
}

function closeGame(){
document.getElementById("gameFrame").src="";
document.getElementById("gameContainer").style.display="none";
grid.style.display="grid";
}

</script>

</body>
</html>
